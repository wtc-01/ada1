<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Kids Ultimate Pro</title>

<style>
body{
  margin:0;
  background:#e6f2ff;
  text-align:center;
  font-family:sans-serif;
}

h2{margin:10px;}

.piano{
  position:relative;
  width:100%;
  max-width:900px;
  height:260px;
  margin:auto;
  display:flex;
}

/* white */
.white{
  flex:1;
  height:100%;
  background:white;
  border:1px solid #333;
  position:relative;
  box-sizing:border-box;
  box-shadow: inset 0 -5px 5px rgba(0,0,0,0.2);
}

/* black */
.black{
  position:absolute;
  width:3.5%;
  height:60%;
  background:black;
  top:0;
  z-index:2;
  border-radius:0 0 5px 5px;
  box-shadow: inset 0 -3px 5px rgba(255,255,255,0.2);
}

.label{
  position:absolute;
  bottom:5px;
  width:100%;
  font-size:12px;
}

/* เอฟเฟกต์ */
.active{
  background:#ffe066 !important;
  box-shadow:0 0 20px yellow;
}

.correct{
  background:#8cff8c !important;
}
.wrong{
  background:#ff6b6b !important;
}

button{
  margin:5px;
  padding:10px;
  font-size:16px;
}
</style>
</head>

<body>

<h2>🎹 Piano Kids Ultimate Pro</h2>

<button onclick="startMemory()">🎯 Memory</button>
<button onclick="startFollow()">💡 Follow</button>

<p>⭐ คะแนน: <span id="score">0</span> | Level: <span id="level">1</span></p>

<div class="piano" id="piano"></div>

<script>

const notes = [
"C4","D4","E4","F4","G4","A4","B4",
"C5","D5","E5","F5","G5","A5","B5"
];

const blackMap = {
"C4":"Db4","D4":"Eb4","F4":"Gb4","G4":"Ab4","A4":"Bb4",
"C5":"Db5","D5":"Eb5","F5":"Gb5","G5":"Ab5","A5":"Bb5"
};

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let bufferMap = {};

const piano = document.getElementById("piano");
let audioMap = {};
let currentKey=null;

/* preload */
async function load(note){
  let res = await fetch("electric_piano_sounds/" + note + ".mp3");
  let arrayBuffer = await res.arrayBuffer();
  let audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  bufferMap[note] = audioBuffer;
}
/*
function load(note){
  let a=new Audio("electric_piano_sounds/"+note+".mp3");
  a.loop=true;
  audioMap[note]=a;
}
*/

notes.forEach(n=>{
  load(n);
  if(blackMap[n]) load(blackMap[n]);
});

/* สร้างคีย์ขาว */
notes.forEach((note,i)=>{
  let key=document.createElement("div");
  key.className="white";
  key.dataset.note=note;
  key.innerHTML=`<div class="label">${note}</div>`;
  piano.appendChild(key);
});

/* ตำแหน่งคีย์ดำจริง */
const blackOffset = {
"C":0.7,
"D":1.7,
"F":3.7,
"G":4.7,
"A":5.7
};

/* สร้างคีย์ดำ */
notes.forEach((note,i)=>{
  let base = note[0];

  if(blackMap[note] && blackOffset[base] !== undefined){
    let b=document.createElement("div");
    b.className="black";
    let octave = Math.floor(i/7);
    let pos = (octave*7 + blackOffset[base]) * (100/14);
    b.style.left = pos + "%";

    let bn = blackMap[note];
    b.dataset.note=bn;
    b.innerHTML=`<div class="label" style="color:white">${bn}</div>`;
    piano.appendChild(b);
  }
});

/* ===== SOUND ===== */
/*
function play(note,el){
  let a=audioMap[note];
  a.currentTime=0;
  a.play();
  el.classList.add("active");
}
*/
function play(note,el){
  let buffer = bufferMap[note];
  if(!buffer) return;

  let source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);
  source.start(0);

  el.classList.add("active");
}

function stop(){
  if(currentKey){
    audioMap[currentKey].pause();
    audioMap[currentKey].currentTime=0;
    let el=document.querySelector(`[data-note="${currentKey}"]`);
    if(el) el.classList.remove("active");
    currentKey=null;
  }
}
//ปลดล๊อก IOS
document.body.addEventListener("touchstart", () => {
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}, { once: true });

/* ===== TOUCH ===== */
piano.addEventListener("touchstart",touch);
piano.addEventListener("touchmove",touch);
piano.addEventListener("touchend",stop);

function touch(e){
  e.preventDefault();
  let t=e.touches[0];
  let el=document.elementFromPoint(t.clientX,t.clientY);
  if(!el || !el.dataset.note) return;

  let note=el.dataset.note;
  if(currentKey!==note){
    stop();
    play(note,el);
    currentKey=note;
    if(gameMode) check(note,el);
  }
}

/* ===== MOUSE ===== */
let mouseDown=false;

piano.addEventListener("mousedown",e=>{
  mouseDown=true;
  handleMouse(e);
});

piano.addEventListener("mousemove",e=>{
  if(mouseDown) handleMouse(e);
});

document.addEventListener("mouseup",()=>{
  mouseDown=false;
  stop();
});

function handleMouse(e){
  let el=document.elementFromPoint(e.clientX,e.clientY);
  if(!el || !el.dataset.note) return;

  let note=el.dataset.note;

  if(currentKey!==note){
    stop();
    play(note,el);
    currentKey=note;
    if(gameMode) check(note,el);
  }
}

/* ===== GAME ===== */
let sequence=[],player=[];
let score=0,level=1;
let gameMode=false;
let mode="";

function startMemory(){
  reset();
  mode="memory";
  next();
}

function startFollow(){
  reset();
  mode="follow";
  spawnNote();
}

function reset(){
  sequence=[];
  player=[];
  score=0;
  level=1;
  gameMode=true;
  updateUI();
}

function updateUI(){
  document.getElementById("score").innerText=score;
  document.getElementById("level").innerText=level;
}

function next(){
  player=[];
  let n=notes[Math.floor(Math.random()*notes.length)];
  sequence.push(n);
  show();
}

function show(){
  let i=0;
  let inter=setInterval(()=>{
    let note=sequence[i];
    let el=document.querySelector(`[data-note="${note}"]`);
    play(note,el);
    setTimeout(()=>el.classList.remove("active"),300);
    i++;
    if(i>=sequence.length) clearInterval(inter);
  },600);
}

function check(note,el){
  if(mode==="memory"){
    player.push(note);
    let i=player.length-1;

    if(player[i]!==sequence[i]){
      wrong(el);
      return;
    }

    correct(el);

    if(player.length===sequence.length){
      score++;
      level++;
      updateUI();
      setTimeout(next,800);
    }
  }

  if(mode==="follow"){
    if(note===target){
      correct(el);
      score++;
      level++;
      updateUI();
      spawnNote();
    }else{
      wrong(el);
    }
  }
}

function correct(el){
  el.classList.add("correct");
  setTimeout(()=>el.classList.remove("correct"),300);
}

function wrong(el){
  el.classList.add("wrong");
  setTimeout(()=>el.classList.remove("wrong"),300);
}

/* ===== FOLLOW MODE ===== */
let target=null;

function spawnNote(){
  target=notes[Math.floor(Math.random()*notes.length)];
  let el=document.querySelector(`[data-note="${target}"]`);
  el.classList.add("active");
}
</script>

</body>
</html>
